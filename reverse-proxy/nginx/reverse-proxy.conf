server {
    listen 80;
    server_name www.clientea.com;


    location / {
        proxy_pass http://192.168.1.6;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    server_name www.clienteb.com;

    location / {
        proxy_pass http://192.168.1.7;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
